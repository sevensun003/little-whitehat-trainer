<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>白帽小队训练营 · 婉婉的冒险</title>

  <!-- Phaser 3 via CDN,无需 npm -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

  <style>
    /* ========== 全局样式 ========== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #FFF5E6; /* 温暖奶油底,对低龄友好 */
      font-family: "PingFang SC", "Microsoft YaHei", "Arial Rounded MT Bold", sans-serif;
      user-select: none;
    }

    /* ========== 主布局:上导航 + 左指令栏 + 中游戏区 + 下队列栏 ========== */
    #app {
      display: grid;
      grid-template-rows: 60px 1fr 140px;
      grid-template-columns: 180px 1fr;
      grid-template-areas:
        "topbar topbar"
        "cmdbar game"
        "cmdbar queue";
      width: 100vw; height: 100vh;
    }

    /* 顶栏 */
    #topbar {
      grid-area: topbar;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      background: #FFE4B5;
      border-bottom: 4px solid #E8C579;
    }
    #topbar .level-info { font-size: 20px; font-weight: bold; color: #6B4423; }
    #topbar .level-info .concept { color: #D2691E; margin-left: 8px; font-size: 14px; }
    #topbar .controls { display: flex; gap: 10px; }
    .btn {
      padding: 8px 16px;
      border: 3px solid #6B4423;
      border-radius: 12px;
      background: #FFF;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      color: #6B4423;
      transition: transform 0.1s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(1px); }
    .btn.primary { background: #66CC66; color: white; border-color: #339933; }
    .btn.danger  { background: #FF9999; color: white; border-color: #CC3333; }
    .btn.warn    { background: #FFCC66; color: #6B4423; }

    /* 左侧指令栏 */
    #cmdbar {
      grid-area: cmdbar;
      background: #FFF;
      border-right: 4px solid #E8C579;
      overflow-y: auto;
      padding: 10px;
    }
    #cmdbar h3 {
      font-size: 14px;
      color: #888;
      text-align: center;
      margin: 5px 0;
      padding: 4px;
      background: #F5F5F5;
      border-radius: 8px;
    }
    .cmd-card {
      margin: 8px 0;
      padding: 12px 8px;
      border: 3px solid #6B4423;
      border-radius: 12px;
      background: #FFFACD;
      cursor: grab;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      color: #6B4423;
      transition: transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .cmd-card:hover { transform: scale(1.05); background: #FFF8DC; }
    .cmd-card:active { cursor: grabbing; }
    .cmd-card .icon { font-size: 22px; }

    /* 中间游戏区 */
    #game {
      grid-area: game;
      background: #E8F4F8;
      position: relative;
    }
    #game-canvas { width: 100%; height: 100%; }

    /* 底部指令队列栏 */
    #queue {
      grid-area: queue;
      background: #FFF;
      border-top: 4px solid #E8C579;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }
    #queue-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px;
    }
    #queue-title { font-weight: bold; color: #6B4423; font-size: 16px; }
    #queue-list {
      flex: 1;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 4px;
      background: #F5F5F5;
      border: 2px dashed #CCC;
      border-radius: 8px;
      min-height: 60px;
      align-items: center;
    }
    #queue-list:empty::before {
      content: "把左边的指令拖到这里 →";
      color: #999; font-size: 14px; margin: auto;
    }
    .queue-item {
      padding: 8px 12px;
      background: #FFFACD;
      border: 2px solid #6B4423;
      border-radius: 10px;
      font-weight: bold;
      color: #6B4423;
      font-size: 14px;
      white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
      position: relative;
    }
    .queue-item .remove {
      color: #CC3333;
      cursor: pointer;
      font-weight: bold;
      font-size: 18px;
      line-height: 1;
    }

    /* 对话弹窗 */
    #dialog-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center; justify-content: center;
      z-index: 100;
    }
    #dialog-overlay.show { display: flex; }
    #dialog-box {
      background: #FFF;
      border: 5px solid #6B4423;
      border-radius: 20px;
      padding: 24px;
      max-width: 500px;
      min-width: 350px;
      box-shadow: 0 8px 0 rgba(107, 68, 35, 0.3);
    }
    #dialog-speaker {
      font-size: 18px; font-weight: bold;
      color: #D2691E; margin-bottom: 10px;
    }
    #dialog-text {
      font-size: 18px; color: #333;
      line-height: 1.6; min-height: 60px;
      margin-bottom: 15px;
    }
    /* 对话里 **关键词** 渲染成红色高亮 */
    #dialog-text .hl {
      color: #E74C3C;
      font-weight: bold;
      background: #FFF3CD;
      padding: 0 5px;
      border-radius: 5px;
      margin: 0 1px;
    }
    #dialog-controls { display: flex; justify-content: flex-end; gap: 10px; }

    /* 步数输入弹窗 */
    #step-input-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center; justify-content: center;
      z-index: 90;
    }
    #step-input-overlay.show { display: flex; }
    #step-input-box {
      background: #FFF;
      border: 4px solid #6B4423;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      min-width: 280px;
    }
    #step-input-box h3 { color: #6B4423; margin-bottom: 12px; }
    #step-input-box .step-buttons { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
    .step-btn {
      width: 44px; height: 44px;
      border: 3px solid #6B4423;
      background: #FFFACD;
      border-radius: 10px;
      font-size: 18px; font-weight: bold;
      color: #6B4423;
      cursor: pointer;
    }
    .step-btn:hover { background: #FFF8DC; }
    .step-btn.active { background: #66CC66; color: white; }

    /* 朗读按钮 */
    .speak-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      background: #E8F4F8;
      border: 2px solid #3498DB;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      margin-left: 8px;
    }
    .speak-btn:hover { background: #D4ECFF; }

    /* 提示按钮"首次出现"气泡提醒 */
    #hint-bubble {
      position: absolute;
      background: #FFFACD;
      border: 3px solid #D4AC0D;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: bold;
      color: #6B4423;
      box-shadow: 0 4px 0 rgba(107, 68, 35, 0.3);
      z-index: 150;
      display: none;
      max-width: 220px;
      line-height: 1.4;
    }
    #hint-bubble::after {
      content: '';
      position: absolute;
      top: -10px; right: 30px;
      width: 0; height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 10px solid #D4AC0D;
    }
    #hint-bubble .close-x {
      margin-left: 8px;
      color: #CC3333; cursor: pointer;
      font-weight: bold;
    }
    @keyframes hint-bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    #btn-hint.new-hint {
      animation: hint-bounce 0.8s ease-in-out 3;
      box-shadow: 0 0 0 4px rgba(212, 172, 13, 0.4);
    }

    /* ============================================================
       手机竖屏 / 窄屏布局:
       视觉 3 层(指令列表 / 地图 / 指令序列)+ 最细顶栏保留按钮
       触发条件:窄屏 (<=768px) 或竖屏
       ============================================================ */
    @media (max-width: 768px), (orientation: portrait) {
      html, body {
        height: 100%; overflow: hidden;
        /* iOS Safari 动态 UI 用 dvh 更稳 */
      }

      /* —— 主栅格:极细顶栏(40px) + cmdbar 固定 72px(横排) + game(弹性) + queue 固定 88px —— */
      #app {
        display: grid;
        grid-template-rows: 40px 72px 1fr 88px;
        grid-template-columns: 1fr;
        grid-template-areas:
          "topbar"
          "cmdbar"
          "game"
          "queue";
        height: 100dvh;
        width: 100vw;
        overflow: hidden;
      }

      /* —— 顶栏:压到 40px —— */
      #topbar {
        padding: 0 6px;
        flex-wrap: nowrap;
        gap: 4px;
        min-width: 0;
        height: 40px;
        border-bottom-width: 2px;
      }
      #topbar .level-info {
        font-size: 13px;
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #topbar .level-info .concept { font-size: 10px; margin-left: 4px; }
      #topbar #version-tag { display: none; }
      #topbar .controls { gap: 4px; flex-wrap: nowrap; flex-shrink: 0; }
      .btn {
        padding: 4px 8px;
        font-size: 12px;
        border-width: 2px;
        border-radius: 8px;
      }

      /* —— 第 1 层 · 指令列表:72px 一行横排 + 横向滚动(含分类名) —— */
      #cmdbar {
        grid-area: cmdbar;
        border-right: none;
        border-bottom: 2px solid #E8C579;
        background: #FFF;
        padding: 4px 6px;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        min-width: 0;
        display: flex;
        flex-direction: row;  /* 横向堆叠 */
        flex-wrap: nowrap;
        align-items: center;
        gap: 4px;
      }
      #cmdbar h3 {
        /* 关键:手机横排 —— 窄横向标签,不再竖排 */
        font-size: 10px;
        margin: 0;
        padding: 2px 5px;
        flex-shrink: 0;
        writing-mode: horizontal-tb;
        white-space: nowrap;
        background: #FFE4B5;
        color: #6B4423;
        border-radius: 6px;
        line-height: 1.2;
      }
      .cmd-card {
        margin: 0;
        min-width: 60px;
        max-width: 76px;
        min-height: 0;
        padding: 4px 4px;
        font-size: 11px;
        flex: 0 0 auto;
        gap: 1px;
        line-height: 1.15;
        white-space: nowrap;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 62px;  /* 填满 cmdbar 内高,两行文字友好 */
      }
      .cmd-card .icon { font-size: 18px; line-height: 1; }

      /* —— 第 2 层 · 游戏地图:吃掉剩余 —— */
      #game {
        grid-area: game;
        min-height: 0;
        min-width: 0;
        background: #E8F4F8;
        position: relative;
      }
      #game-canvas {
        width: 100%;
        height: 100%;
        min-height: 0;
      }
      #game-canvas canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      /* —— 第 3 层 · 指令序列:88px 固定 —— */
      #queue {
        grid-area: queue;
        padding: 4px 6px 6px;
        display: flex;
        flex-direction: column;
        min-width: 0;
        background: #FFF;
        border-top: 2px solid #E8C579;
      }
      #queue-header { margin-bottom: 2px; align-items: center; }
      #queue-title { font-size: 12px; }
      #queue-header .btn { padding: 3px 8px; font-size: 11px; }
      #queue-list {
        min-height: 0;
        flex: 1;
        padding: 4px;
        gap: 4px;
        overflow-x: auto;
        overflow-y: hidden;
        align-items: center;
        -webkit-overflow-scrolling: touch;
      }
      #queue-list:empty::before {
        content: "点上面的指令放到这里 ↑";
        font-size: 12px;
      }
      .queue-item {
        padding: 5px 8px;
        font-size: 12px;
        flex-shrink: 0;
      }
      .queue-item .remove { font-size: 15px; }

      /* —— 对话弹窗 —— */
      #dialog-box {
        margin: 10px;
        min-width: unset;
        max-width: calc(100vw - 20px);
        padding: 18px 20px;
      }
      #dialog-speaker { font-size: 17px; }
      #dialog-text { font-size: 18px; min-height: 50px; line-height: 1.5; }
      #dialog-controls {
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
      }

      /* —— 步数输入弹窗 —— */
      #step-input-box {
        margin: 10px;
        min-width: unset;
        max-width: calc(100vw - 20px);
        padding: 16px;
      }
      #step-input-box h3 { font-size: 17px; }
      .step-btn { width: 42px; height: 42px; font-size: 17px; }

      /* —— 朗读按钮 —— */
      .speak-btn { width: 32px; height: 32px; font-size: 14px; }
    }

    /* —— 小屏手机(竖屏,≤ 380px)再压一层 —— */
    @media (max-width: 380px) {
      #app {
        grid-template-rows: 38px 66px 1fr 80px;
      }
      #topbar { height: 38px; }
      #topbar .level-info { font-size: 12px; }
      #topbar .level-info .concept { display: none; }
      .btn { padding: 3px 6px; font-size: 11px; }
      #cmdbar h3 { font-size: 10px; padding: 2px 4px; }
      .cmd-card { min-width: 54px; max-width: 68px; padding: 3px 3px; font-size: 10px; height: 56px; }
      .cmd-card .icon { font-size: 16px; }
      .queue-item { font-size: 11px; padding: 4px 7px; }
      #dialog-text { font-size: 15px; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- 顶栏 -->
  <div id="topbar">
    <div class="level-info">
      <span id="level-title">关卡加载中…</span>
      <span class="concept" id="level-concept"></span>
      <span id="version-tag" style="color:#999; font-size:11px; margin-left:8px;">v2026.04.23c</span>
    </div>
    <div class="controls">
      <button class="btn" onclick="window.location.href='levels.html'">🗺️ 地图</button>
      <button class="btn" id="btn-hint" style="display:none;">💡 提示</button>
      <button class="btn warn" id="btn-reset">🔄 重来</button>
      <button class="btn primary" id="btn-run">▶ 执行</button>
    </div>
  </div>

  <!-- 左侧指令栏 -->
  <div id="cmdbar">
    <h3>指令手册</h3>
    <div id="cmd-list"><!-- 按关卡动态填充 --></div>
  </div>

  <!-- 中间游戏区 (Phaser 会挂到这里) -->
  <div id="game">
    <div id="game-canvas"></div>
  </div>

  <!-- 底部队列栏 -->
  <div id="queue">
    <div id="queue-header">
      <span id="queue-title">📜 我的指令队列</span>
      <button class="btn" id="btn-clear-queue" style="font-size:14px;padding:4px 12px;">清空</button>
    </div>
    <div id="queue-list"></div>
  </div>

</div>

<!-- 对话弹窗 -->
<div id="dialog-overlay">
  <div id="dialog-box">
    <div id="dialog-speaker">小天</div>
    <div id="dialog-text">加载中...</div>
    <div id="dialog-controls">
      <button class="btn" id="btn-dialog-speak">🔊 朗读</button>
      <button class="btn" id="btn-dialog-skip">跳过 »</button>
      <button class="btn primary" id="btn-dialog-next">下一步 ▶</button>
    </div>
  </div>
</div>

<!-- 步数输入弹窗 -->
<div id="step-input-overlay">
  <div id="step-input-box">
    <h3 id="step-input-title">走几步？</h3>
    <div class="step-buttons" id="step-buttons">
      <!-- 1-9 按钮动态生成 -->
    </div>
    <div style="display:flex;gap:8px;justify-content:center;">
      <button class="btn" id="btn-step-cancel">取消</button>
      <button class="btn primary" id="btn-step-confirm">确定</button>
    </div>
  </div>
</div>

<!-- 提示按钮首次出现的气泡 -->
<div id="hint-bubble">
  💡 卡住了?点这里看提示!
  <span class="close-x" onclick="document.getElementById('hint-bubble').style.display='none'">×</span>
</div>

<!-- 游戏主逻辑 -->
<script src="game.js?v=2026.04.23c"></script>
</body>
</html>
