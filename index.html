<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 强制禁用缓存(改 UI 太频繁,避免用户一直看老版) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>白帽小队训练营 · 婉婉的冒险</title>

  <!-- Phaser 3 via CDN,无需 npm -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

  <style>
    /* ========== 全局样式 ========== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #FFF5E6; /* 温暖奶油底,对低龄友好 */
      font-family: "PingFang SC", "Microsoft YaHei", "Arial Rounded MT Bold", sans-serif;
      user-select: none;
    }

    /* ========== 主布局:上导航 + 左指令栏 + 中游戏区 + 下队列栏 ========== */
    #app {
      display: grid;
      grid-template-rows: 60px 1fr 140px;
      grid-template-columns: 180px 1fr;
      grid-template-areas:
        "topbar topbar"
        "cmdbar game"
        "cmdbar queue";
      width: 100vw; height: 100vh;
    }

    /* 顶栏 */
    #topbar {
      grid-area: topbar;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      background: #FFE4B5;
      border-bottom: 4px solid #E8C579;
    }
    #topbar .level-info { font-size: 20px; font-weight: bold; color: #6B4423; }
    #topbar .level-info .concept { color: #D2691E; margin-left: 8px; font-size: 14px; }
    #topbar .controls { display: flex; gap: 10px; }
    .btn {
      padding: 8px 16px;
      border: 3px solid #6B4423;
      border-radius: 12px;
      background: #FFF;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      color: #6B4423;
      transition: transform 0.1s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(1px); }
    .btn.primary { background: #66CC66; color: white; border-color: #339933; }
    .btn.danger  { background: #FF9999; color: white; border-color: #CC3333; }
    .btn.warn    { background: #FFCC66; color: #6B4423; }

    /* 左侧指令栏 */
    #cmdbar {
      grid-area: cmdbar;
      background: #FFF;
      border-right: 4px solid #E8C579;
      overflow-y: auto;
      padding: 10px;
    }
    #cmdbar h3 {
      font-size: 14px;
      color: #888;
      text-align: center;
      margin: 5px 0;
      padding: 4px;
      background: #F5F5F5;
      border-radius: 8px;
    }
    .cmd-card {
      margin: 8px 0;
      padding: 12px 8px;
      border: 3px solid #6B4423;
      border-radius: 12px;
      background: #FFFACD;
      cursor: grab;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      color: #6B4423;
      transition: transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .cmd-card:hover { transform: scale(1.05); background: #FFF8DC; }
    .cmd-card:active { cursor: grabbing; }
    .cmd-card .icon { font-size: 22px; }

    /* 中间游戏区 */
    #game {
      grid-area: game;
      background: #E8F4F8;
      position: relative;
    }
    #game-canvas { width: 100%; height: 100%; }

    /* 底部指令队列栏 */
    #queue {
      grid-area: queue;
      background: #FFF;
      border-top: 4px solid #E8C579;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }
    #queue-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px;
    }
    #queue-header .btn { font-size: 14px; padding: 4px 12px; }  /* 桌面:小一点的清空键 */
    #queue-title { font-weight: bold; color: #6B4423; font-size: 16px; }
    #queue-list {
      flex: 1;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 4px;
      background: #F5F5F5;
      border: 2px dashed #CCC;
      border-radius: 8px;
      min-height: 60px;
      align-items: center;
    }
    #queue-list:empty::before {
      content: "把左边的指令拖到这里 →";
      color: #999; font-size: 14px; margin: auto;
    }
    .queue-item {
      padding: 8px 12px;
      background: #FFFACD;
      border: 2px solid #6B4423;
      border-radius: 10px;
      font-weight: bold;
      color: #6B4423;
      font-size: 14px;
      white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
      position: relative;
    }
    .queue-item .remove {
      color: #CC3333;
      cursor: pointer;
      font-weight: bold;
      font-size: 18px;
      line-height: 1;
    }

    /* 对话弹窗 */
    #dialog-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center; justify-content: center;
      z-index: 100;
    }
    #dialog-overlay.show { display: flex; }
    #dialog-box {
      background: #FFF;
      border: 5px solid #6B4423;
      border-radius: 20px;
      padding: 24px;
      max-width: 500px;
      min-width: 350px;
      box-shadow: 0 8px 0 rgba(107, 68, 35, 0.3);
    }
    #dialog-speaker {
      font-size: 18px; font-weight: bold;
      color: #D2691E; margin-bottom: 10px;
    }
    #dialog-text {
      font-size: 18px; color: #333;
      line-height: 1.6; min-height: 60px;
      margin-bottom: 15px;
    }
    /* 对话里 **关键词** 渲染成红色高亮 */
    #dialog-text .hl {
      color: #E74C3C;
      font-weight: bold;
      background: #FFF3CD;
      padding: 0 5px;
      border-radius: 5px;
      margin: 0 1px;
    }
    #dialog-controls { display: flex; justify-content: flex-end; gap: 10px; }

    /* 步数输入弹窗 */
    #step-input-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center; justify-content: center;
      z-index: 90;
    }
    #step-input-overlay.show { display: flex; }
    #step-input-box {
      background: #FFF;
      border: 4px solid #6B4423;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      min-width: 280px;
    }
    #step-input-box h3 { color: #6B4423; margin-bottom: 12px; }
    #step-input-box .step-buttons { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
    .step-btn {
      width: 44px; height: 44px;
      border: 3px solid #6B4423;
      background: #FFFACD;
      border-radius: 10px;
      font-size: 18px; font-weight: bold;
      color: #6B4423;
      cursor: pointer;
    }
    .step-btn:hover { background: #FFF8DC; }
    .step-btn.active { background: #66CC66; color: white; }

    /* 朗读按钮 */
    .speak-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      background: #E8F4F8;
      border: 2px solid #3498DB;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      margin-left: 8px;
    }
    .speak-btn:hover { background: #D4ECFF; }

    /* 提示按钮"首次出现"气泡提醒 */
    #hint-bubble {
      position: absolute;
      background: #FFFACD;
      border: 3px solid #D4AC0D;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: bold;
      color: #6B4423;
      box-shadow: 0 4px 0 rgba(107, 68, 35, 0.3);
      z-index: 150;
      display: none;
      max-width: 220px;
      line-height: 1.4;
    }
    #hint-bubble::after {
      content: '';
      position: absolute;
      top: -10px; right: 30px;
      width: 0; height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 10px solid #D4AC0D;
    }
    #hint-bubble .close-x {
      margin-left: 8px;
      color: #CC3333; cursor: pointer;
      font-weight: bold;
    }
    @keyframes hint-bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    #btn-hint.new-hint {
      animation: hint-bounce 0.8s ease-in-out 3;
      box-shadow: 0 0 0 4px rgba(212, 172, 13, 0.4);
    }

    /* ============================================================
       手机 / 平板竖屏布局(v20260424e · 字体 3x)
       目标屏幕:980 × 2400
       ============================================================ */
    @media (max-width: 1100px), (orientation: portrait) {
      html, body { height: 100%; overflow: hidden; }

      /* 行高重分配:顶栏 100 / 指令列表 180 / 地图(1fr,尽量大) / 队列 200 */
      #app {
        grid-template-rows: 100px 180px 1fr 200px;
        grid-template-columns: 1fr;
        grid-template-areas:
          "topbar"
          "cmdbar"
          "game"
          "queue";
        height: 100dvh;
        width: 100vw;
        overflow: hidden;
      }

      /* —— 顶栏 —— */
      #topbar {
        padding: 0 20px;
        height: 100px;
        gap: 14px;
        flex-wrap: nowrap;
        min-width: 0;
      }
      #topbar .level-info {
        font-size: 36px;
        font-weight: bold;
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #topbar .level-info .concept { font-size: 26px; margin-left: 12px; }
      #topbar #version-tag { display: none; }
      #topbar .controls { gap: 14px; flex-wrap: nowrap; flex-shrink: 0; }
      .btn {
        padding: 16px 26px;
        font-size: 30px;
        font-weight: bold;
        border-width: 4px;
        border-radius: 16px;
      }

      /* —— 第 1 层 · 指令列表 —— */
      #cmdbar {
        border-right: none;
        border-bottom: 4px solid #E8C579;
        background: #FFF;
        padding: 10px 14px;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        min-width: 0;
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: flex-start;
        gap: 10px;
      }
      #cmdbar > h3 { display: none; }
      #cmd-list {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        min-width: 0;
        width: 100%;
      }
      /* 分类标签 */
      #cmdbar h3 {
        font-size: 28px;
        margin: 0;
        padding: 8px 18px;
        flex-shrink: 0;
        white-space: nowrap;
        background: #FFE4B5;
        color: #6B4423;
        border-radius: 14px;
        line-height: 1.2;
        font-weight: bold;
      }
      /* 指令卡 */
      .cmd-card {
        margin: 0;
        min-width: 180px;
        max-width: 230px;
        padding: 14px 18px;
        font-size: 28px;
        font-weight: bold;
        flex: 0 0 auto;
        gap: 10px;
        line-height: 1.2;
        white-space: nowrap;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        height: 72px;
      }
      .cmd-card .icon { font-size: 40px; line-height: 1; }

      /* —— 第 2 层 · 地图:手机端 canvas 由 Phaser 决定大小,#game 横向滚动 —— */
      #game {
        min-height: 0;
        min-width: 0;
        background: #E8F4F8;
        position: relative;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
      }
      #game-canvas {
        min-height: 0;
        /* 宽高不设,由 Phaser 的 canvas 元素撑开 */
      }
      #game-canvas > canvas {
        display: block;
      }

      /* —— 第 3 层 · 指令队列 —— */
      #queue {
        padding: 12px 16px 14px;
        display: flex;
        flex-direction: column;
        min-width: 0;
        background: #FFF;
        border-top: 4px solid #E8C579;
      }
      #queue-title { font-size: 32px; font-weight: bold; }
      #queue-header { margin-bottom: 10px; align-items: center; }
      #queue-header .btn { padding: 10px 20px; font-size: 24px; }
      #queue-list {
        min-height: 0;
        flex: 1;
        padding: 8px;
        gap: 12px;
        overflow-x: auto;
        overflow-y: hidden;
        align-items: center;
        -webkit-overflow-scrolling: touch;
      }
      #queue-list:empty::before {
        content: "点上面的指令放到这里 ↑";
        font-size: 26px;
      }
      .queue-item {
        padding: 14px 22px;
        font-size: 28px;
        font-weight: bold;
        flex-shrink: 0;
      }
      .queue-item .remove { font-size: 40px; margin-left: 10px; }

      /* —— 对话弹窗 —— */
      #dialog-box {
        margin: 16px;
        min-width: unset;
        max-width: calc(100vw - 32px);
        padding: 32px 36px;
      }
      #dialog-speaker { font-size: 34px; }
      #dialog-text { font-size: 40px; min-height: 100px; line-height: 1.5; }
      #dialog-controls {
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px;
      }

      /* —— 步数输入弹窗 —— */
      #step-input-box {
        margin: 16px;
        min-width: unset;
        max-width: calc(100vw - 32px);
        padding: 32px;
      }
      #step-input-box h3 { font-size: 36px; }
      .step-btn { width: 80px; height: 80px; font-size: 36px; }

      /* —— 朗读按钮 —— */
      .speak-btn { width: 60px; height: 60px; font-size: 28px; }
    }

    /* 原先的 ≤380px 小屏压缩:已移除(用户明确不用小屏手机) */
  </style>
</head>
<body>

<div id="app">

  <!-- 顶栏 -->
  <div id="topbar">
    <div class="level-info">
      <span id="level-title">关卡加载中…</span>
      <span class="concept" id="level-concept"></span>
      <span id="version-tag" style="color:#999; font-size:11px; margin-left:8px;">v20260424e</span>
    </div>
    <div class="controls">
      <button class="btn" onclick="window.location.href='levels.html'">🗺️ 地图</button>
      <button class="btn" id="btn-hint" style="display:none;">💡 提示</button>
      <button class="btn warn" id="btn-reset">🔄 重来</button>
      <button class="btn primary" id="btn-run">▶ 执行</button>
    </div>
  </div>

  <!-- 左侧指令栏 -->
  <div id="cmdbar">
    <h3>指令手册</h3>
    <div id="cmd-list"><!-- 按关卡动态填充 --></div>
  </div>

  <!-- 中间游戏区 (Phaser 会挂到这里) -->
  <div id="game">
    <div id="game-canvas"></div>
  </div>

  <!-- 底部队列栏 -->
  <div id="queue">
    <div id="queue-header">
      <span id="queue-title">📜 我的指令队列</span>
      <button class="btn" id="btn-clear-queue">清空</button>
    </div>
    <div id="queue-list"></div>
  </div>

</div>

<!-- 对话弹窗 -->
<div id="dialog-overlay">
  <div id="dialog-box">
    <div id="dialog-speaker">小天</div>
    <div id="dialog-text">加载中...</div>
    <div id="dialog-controls">
      <button class="btn" id="btn-dialog-speak">🔊 朗读</button>
      <button class="btn" id="btn-dialog-skip">跳过 »</button>
      <button class="btn primary" id="btn-dialog-next">下一步 ▶</button>
    </div>
  </div>
</div>

<!-- 步数输入弹窗 -->
<div id="step-input-overlay">
  <div id="step-input-box">
    <h3 id="step-input-title">走几步？</h3>
    <div class="step-buttons" id="step-buttons">
      <!-- 1-9 按钮动态生成 -->
    </div>
    <div style="display:flex;gap:8px;justify-content:center;">
      <button class="btn" id="btn-step-cancel">取消</button>
      <button class="btn primary" id="btn-step-confirm">确定</button>
    </div>
  </div>
</div>

<!-- 提示按钮首次出现的气泡 -->
<div id="hint-bubble">
  💡 卡住了?点这里看提示!
  <span class="close-x" onclick="document.getElementById('hint-bubble').style.display='none'">×</span>
</div>

<!-- 游戏主逻辑 -->
<script src="game.js?v=20260424e"></script>
</body>
</html>
